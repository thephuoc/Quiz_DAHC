<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📂 Quản Lý Kết Quả Thi - DAHC</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ===== Login Screen ===== */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .login-box .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .login-box h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-box p {
            opacity: 0.7;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .login-box input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .login-box .btn-login {
            width: 100%;
            padding: 15px;
            background: #4CAF50;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box .btn-login:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .login-box .back-link {
            display: block;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
        }

        .login-box .back-link:hover {
            color: #4CAF50;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #ff8a80;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* ===== Main Content ===== */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.8;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .tab.active {
            background: #4CAF50;
        }

        .section {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .section.active {
            display: block;
        }

        .section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .card-info {
            flex: 1;
        }

        .card-info h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #4CAF50;
        }

        .card-info p {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .card-info .meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card-info .meta span {
            font-size: 12px;
            opacity: 0.6;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            opacity: 0.6;
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #4CAF50;
        }

        .stat-card .label {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-box {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            width: 300px;
            max-width: 100%;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .result-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .result-badge.pass {
            background: #4CAF50;
            color: white;
        }

        .result-badge.fail {
            background: #f44336;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            opacity: 0.6;
            font-size: 13px;
        }

        footer a {
            color: #4CAF50;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .card-actions {
                width: 100%;
            }

            .card-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="icon">🔐</div>
            <h2>Xác Thực Quản Trị</h2>
            <p>Nhập mật khẩu để truy cập trang quản lý</p>

            <div class="error-message" id="errorMessage">
                ❌ Mật khẩu không đúng!
            </div>

            <input type="password" id="passwordInput" placeholder="Nhập mật khẩu..." autofocus>
            <button class="btn-login" onclick="verifyPassword()">🔓 Đăng Nhập</button>

            <a href="index.html" class="back-link">← Quay về trang chủ</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" id="mainContent" style="display: none;">
        <header>
            <h1>📂 Quản Lý Kết Quả Thi</h1>
            <p>Xem lịch sử thi và tải lại PDF từ bộ nhớ tạm</p>
            <div style="margin-top: 15px;">
                <button class="btn btn-primary" onclick="backupDataToRoot()"
                    style="margin: 0 auto; display: inline-flex; gap: 8px;">
                    📂 Sao lưu dữ liệu ra thư mục gốc (Data_Export)
                </button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="showSection('pdf-cache', event)">💾 PDF Cache</button>
            <button class="tab" onclick="showSection('exam-history', event)">📋 Lịch Sử Thi</button>
        </div>

        <!-- PDF Cache Section -->
        <div id="pdf-cache" class="section active">
            <h2>💾 PDF Đã Lưu Trong Bộ Nhớ Tạm</h2>

            <div class="stats" id="pdfStats"></div>

            <div class="toolbar">
                <input type="text" class="search-box" id="searchPDF" placeholder="🔍 Tìm kiếm theo tên file..."
                    oninput="filterPDFList()">
                <div>
                    <button class="btn btn-danger" onclick="clearAllPDFCache()">🗑️ Xóa tất cả</button>
                </div>
            </div>

            <div class="card-list" id="pdfList"></div>
        </div>

        <!-- Exam History Section -->
        <div id="exam-history" class="section">
            <h2>📋 Lịch Sử Tất Cả Bài Thi</h2>

            <div class="stats" id="historyStats"></div>

            <div class="toolbar">
                <input type="text" class="search-box" id="searchHistory" placeholder="🔍 Tìm kiếm theo tên thí sinh..."
                    oninput="filterHistoryList()">
                <div>
                    <button class="btn btn-danger" onclick="clearAllHistory()">🗑️ Xóa tất cả</button>
                </div>
            </div>

            <div class="card-list" id="historyList"></div>
        </div>

        <footer>
            <p>Hệ thống thi trắc nghiệm DAHC | <a href="index.html">← Về trang chủ</a></p>
        </footer>
    </div>

    <script>
        // ===== Password =====
        const HISTORY_PASSWORD = 'DAHC@6789'; // Cùng mật khẩu với Admin

        // ===== Backup Function =====
        async function backupDataToRoot() {
            if (!confirm('Bạn có muốn sao chép toàn bộ dữ liệu (PDF & JSON) ra thư mục gốc không?')) return;

            if (window.electronAPI && typeof window.electronAPI.backupDataToRoot === 'function') {
                try {
                    const loadingDiv = document.createElement('div');
                    loadingDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;color:white;font-size:20px;';
                    loadingDiv.id = 'backupLoading';
                    loadingDiv.innerText = 'Đang sao lưu dữ liệu...';
                    document.body.appendChild(loadingDiv);

                    const result = await window.electronAPI.backupDataToRoot();

                    document.getElementById('backupLoading')?.remove();

                    if (result.success) {
                        alert('✅ Đã sao lưu thành công!\nThư mục: ' + result.path);
                    } else {
                        alert('❌ Sao lưu thất bại: ' + result.error);
                    }
                } catch (e) {
                    alert('❌ Lỗi: ' + e.message);
                    document.getElementById('backupLoading')?.remove();
                }
            } else {
                alert('Tính năng này chỉ khả dụng trên ứng dụng Desktop (Electron).');
            }
        }

        // ===== Storage Keys =====
        const EXAM_HISTORY_KEY = 'exam_history';
        const PDF_DB_NAME = 'QuizDAHC_PDFCache';
        const PDF_DB_VERSION = 1;
        const PDF_STORE_NAME = 'pdfs';

        // ===== Password Verification =====
        function verifyPassword() {
            const password = document.getElementById('passwordInput').value;
            const errorMessage = document.getElementById('errorMessage');

            if (password === HISTORY_PASSWORD) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').style.display = 'block';
                loadPDFCache();
            } else {
                errorMessage.classList.add('show');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();

                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        }

        // Enter key to submit
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyPassword();
            }
        });

        // ===== Tab Navigation =====
        function showSection(sectionId, evt) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            document.getElementById(sectionId).classList.add('active');
            if (evt && evt.target) {
                evt.target.classList.add('active');
            }

            if (sectionId === 'pdf-cache') {
                loadPDFCache();
            } else {
                loadExamHistory();
            }
        }

        // ===== PDF Cache Functions (IndexedDB) =====
        function openPDFDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(PDF_DB_NAME, PDF_DB_VERSION);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(PDF_STORE_NAME)) {
                        const store = db.createObjectStore(PDF_STORE_NAME, { keyPath: 'examId' });
                        store.createIndex('savedAt', 'savedAt', { unique: false });
                    }
                };

                request.onsuccess = (event) => resolve(event.target.result);
                request.onerror = (event) => reject(event.target.error);
            });
        }

        async function getPDFCache() {
            try {
                const db = await openPDFDatabase();
                const tx = db.transaction(PDF_STORE_NAME, 'readonly');
                const store = tx.objectStore(PDF_STORE_NAME);

                const allItems = await new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });

                db.close();
                return allItems.sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
            } catch (error) {
                console.error('Error reading PDF cache:', error);
                return [];
            }
        }

        async function loadPDFCache() {
            const cache = await getPDFCache();
            const listEl = document.getElementById('pdfList');
            const statsEl = document.getElementById('pdfStats');

            // Stats
            const totalSizeMB = cache.reduce((sum, item) => sum + (item.pdfData?.length || 0) * 0.75 / 1024 / 1024, 0);
            statsEl.innerHTML = `
                <div class="stat-card">
                    <div class="number">${cache.length}</div>
                    <div class="label">PDF đã lưu</div>
                </div>
                <div class="stat-card">
                    <div class="number">${totalSizeMB.toFixed(1)} MB</div>
                    <div class="label">Dung lượng sử dụng</div>
                </div>
                <div class="stat-card">
                    <div class="number">40</div>
                    <div class="label">Giới hạn tối đa</div>
                </div>
            `;

            if (cache.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>Chưa có PDF nào được lưu</h3>
                        <p>PDF sẽ tự động được lưu khi bạn xuất kết quả thi</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = cache.map((item, index) => `
                <div class="card" data-filename="${item.fileName?.toLowerCase() || ''}">
                    <div class="card-info">
                        <h3>📄 ${item.fileName || 'Unknown'}</h3>
                        <div class="meta">
                            <span>📅 ${formatDate(item.savedAt)}</span>
                            <span>💾 ${((item.pdfData?.length || 0) * 0.75 / 1024 / 1024).toFixed(1)} MB</span>
                            <span>🔑 ID: ${item.examId}</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="downloadPDF(${item.examId})">
                            📥 Tải về
                        </button>
                        <button class="btn btn-danger" onclick="deletePDF(${item.examId})">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function downloadPDF(examId) {
            try {
                const db = await openPDFDatabase();
                const tx = db.transaction(PDF_STORE_NAME, 'readonly');
                const store = tx.objectStore(PDF_STORE_NAME);

                const pdfItem = await new Promise((resolve, reject) => {
                    const request = store.get(examId);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
                db.close();

                if (!pdfItem) {
                    alert('Không tìm thấy PDF!');
                    return;
                }

                const byteCharacters = atob(pdfItem.pdfData);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/pdf' });

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = pdfItem.fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                alert('✅ Đã tải PDF: ' + pdfItem.fileName);
            } catch (error) {
                console.error('Error downloading PDF:', error);
                alert('❌ Lỗi khi tải PDF!');
            }
        }

        async function deletePDF(examId) {
            if (!confirm('Bạn có chắc muốn xóa PDF này?')) return;

            try {
                const db = await openPDFDatabase();
                const tx = db.transaction(PDF_STORE_NAME, 'readwrite');
                const store = tx.objectStore(PDF_STORE_NAME);
                store.delete(examId);

                await new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = () => reject(tx.error);
                });
                db.close();
                loadPDFCache();
            } catch (error) {
                console.error('Error deleting PDF:', error);
                alert('❌ Lỗi khi xóa PDF!');
            }
        }

        async function clearAllPDFCache() {
            if (!confirm('Bạn có chắc muốn xóa TẤT CẢ PDF đã lưu?')) return;

            try {
                const db = await openPDFDatabase();
                const tx = db.transaction(PDF_STORE_NAME, 'readwrite');
                const store = tx.objectStore(PDF_STORE_NAME);
                store.clear();

                await new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = () => reject(tx.error);
                });
                db.close();
                loadPDFCache();
                alert('✅ Đã xóa tất cả PDF cache!');
            } catch (error) {
                console.error('Error clearing PDF cache:', error);
                alert('❌ Lỗi khi xóa PDF cache!');
            }
        }

        function filterPDFList() {
            const query = document.getElementById('searchPDF').value.toLowerCase();
            document.querySelectorAll('#pdfList .card').forEach(card => {
                const filename = card.dataset.filename || '';
                card.style.display = filename.includes(query) ? 'flex' : 'none';
            });
        }

        // ===== Exam History Functions =====
        function getExamHistory() {
            try {
                const historyJson = localStorage.getItem(EXAM_HISTORY_KEY);
                return historyJson ? JSON.parse(historyJson) : [];
            } catch (error) {
                console.error('Error reading exam history:', error);
                return [];
            }
        }

        function loadExamHistory() {
            const history = getExamHistory();
            const listEl = document.getElementById('historyList');
            const statsEl = document.getElementById('historyStats');

            // Stats
            const passCount = history.filter(h => h.result?.isPassed).length;
            const failCount = history.length - passCount;

            statsEl.innerHTML = `
                <div class="stat-card">
                    <div class="number">${history.length}</div>
                    <div class="label">Tổng số bài thi</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#4CAF50">${passCount}</div>
                    <div class="label">Đạt</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#f44336">${failCount}</div>
                    <div class="label">Không đạt</div>
                </div>
            `;

            if (history.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>Chưa có lịch sử thi</h3>
                        <p>Lịch sử sẽ được lưu tự động sau mỗi bài thi</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = history.map((item, index) => `
                <div class="card" data-name="${item.user?.fullName?.toLowerCase() || ''}">
                    <div class="card-info">
                        <h3>👤 ${item.user?.fullName || 'Unknown'}</h3>
                        <p>
                            <span class="result-badge ${item.result?.isPassed ? 'pass' : 'fail'}">
                                ${item.result?.isPassed ? '✓ ĐẠT' : '✗ KHÔNG ĐẠT'}
                            </span>
                            &nbsp;&nbsp;
                            <strong>${item.result?.correctAnswers || 0}/${item.result?.totalQuestions || 30}</strong> câu đúng
                        </p>
                        <div class="meta">
                            <span>📅 ${formatDate(item.savedAt)}</span>
                            <span>🏢 ${item.user?.department || 'N/A'}</span>
                            <span>🔄 Lần ${item.user?.attemptNumber || 1}</span>
                            <span>⏱️ ${item.exam?.duration || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-secondary" onclick="viewDetail(${index})">
                            👁️ Chi tiết
                        </button>
                        <button class="btn btn-danger" onclick="deleteHistory(${index})">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function viewDetail(index) {
            const history = getExamHistory();
            const item = history[index];

            if (!item) return;

            const detail = `
═══════════════════════════════════════
📋 CHI TIẾT KẾT QUẢ THI
═══════════════════════════════════════

👤 Họ tên: ${item.user?.fullName}
🔄 Lần thi: ${item.user?.attemptNumber || 1}
🏢 Đơn vị: ${item.user?.department}
🔄 Lần thi: ${item.user?.attemptNumber}

📅 Ngày thi: ${formatDate(item.exam?.startTime)}
⏱️ Thời gian làm bài: ${item.exam?.duration}
${item.exam?.timeUp ? '⚠️ Hết giờ: Có' : ''}

═══════════════════════════════════════
📊 KẾT QUẢ
═══════════════════════════════════════

✅ Số câu đúng: ${item.result?.correctAnswers}
❌ Số câu sai: ${item.result?.wrongAnswers}
📈 Điểm: ${item.result?.score}%
🏆 Kết quả: ${item.result?.isPassed ? 'ĐẠT' : 'KHÔNG ĐẠT'}

═══════════════════════════════════════
            `;

            alert(detail);
        }

        function deleteHistory(index) {
            if (!confirm('Bạn có chắc muốn xóa lịch sử này?')) return;

            const history = getExamHistory();
            history.splice(index, 1);
            localStorage.setItem(EXAM_HISTORY_KEY, JSON.stringify(history));
            loadExamHistory();
        }

        function clearAllHistory() {
            if (!confirm('Bạn có chắc muốn xóa TẤT CẢ lịch sử thi?')) return;

            localStorage.removeItem(EXAM_HISTORY_KEY);
            loadExamHistory();
            alert('✅ Đã xóa tất cả lịch sử thi!');
        }

        function filterHistoryList() {
            const query = document.getElementById('searchHistory').value.toLowerCase();
            document.querySelectorAll('#historyList .card').forEach(card => {
                const name = card.dataset.name || '';
                card.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }

        // ===== Utility Functions =====
        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            try {
                const date = new Date(dateStr);
                return date.toLocaleString('vi-VN', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return dateStr;
            }
        }
    </script>
</body>

</html>
